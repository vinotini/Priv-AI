<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PrivAI - Privacy Leak Detection</title>
  <link rel="stylesheet" href="/public/css/styles.css?v=2" />
</head>
<body>
  <div class="container">
    <h1>PrivAI</h1>
    <p>AI-powered privacy leak detection for shared documents</p>
    <form id="uploadForm">
      <input type="file" id="fileInput" accept=".pdf,.txt" />
      <button type="submit">Analyze</button>
      <p id="error" style="color:#ff3860; font-weight:700; margin-top:10px;"></p>
    </form>

    <div id="preview" class="preview-box"></div>

    <ul id="leakList"></ul>

    <div id="scoreMeter">
      <div id="scoreBar"></div>
    </div>
    <p id="scoreText"></p>
  </div>

  <script src="/public/js/script.js?v=2"></script>
</body>
</html>
